<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HyperOS Full Responsive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        :root { --miui-blur: blur(25px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Cairo', sans-serif;
        }

        /* حاوية الهاتف: تأخذ أبعاد الشاشة أوتوماتيكياً */
        .phone-screen {
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=2000') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* شريط الحالة - يراعي "النوتش" في الهواتف الحديثة */
        .status-bar {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            padding: env(safe-area-inset-top, 10px) 20px 5px;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .battery-side { display: flex; align-items: center; gap: 6px; }
        .battery-box {
            width: 22px; height: 11px;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 3px;
            padding: 1px;
            display: flex;
        }
        .battery-fill { height: 100%; background: white; width: 88%; }

        /* الساعة - تتموضع بنسبة مئوية من ارتفاع الشاشة */
        .clock-container {
            text-align: center;
            color: white;
            margin-top: 12vh;
        }
        .clock-container h1 { font-size: 18vw; font-weight: 200; margin: 0; line-height: 1; }
        .clock-container p { font-size: 4.5vw; opacity: 0.9; margin-top: 10px; }

        /* شريط البحث المتجاوب */
        .google-bar {
            width: 88%;
            margin: 4vh auto;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* شبكة الأيقونات - تتغير أحجامها حسب حجم الشاشة */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5vw;
            padding: 2vh 8vw;
        }
        .app { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .icon-sq { 
            width: 15vw; height: 15vw; 
            max-width: 65px; max-height: 65px;
            border-radius: 22%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 7vw; color: white;
        }
        .app-text { color: white; font-size: 3vw; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        /* نافذة USSD - عرضها يتناسب مع التليفون */
        .ussd-box {
            position: absolute;
            bottom: 15vh; 
            left: 5%; right: 5%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 6vw;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            z-index: 1000;
        }
        
        .ussd-body { text-align: right; margin: 15px 0; font-size: 4.2vw; color: #000; line-height: 1.5; }
        .black-text { color: #000; font-weight: 800; }

        .ussd-input {
            width: 100%; border: none; border-bottom: 2px solid #1a73e8;
            padding: 8px; text-align: right; outline: none;
            background: transparent; margin-bottom: 20px; font-size: 16px;
        }

        .ussd-actions { display: flex; gap: 10px; }
        .u-btn { flex: 1; padding: 14px; border-radius: 20px; border: none; font-weight: 800; font-size: 4vw; cursor: pointer; }
        .u-cancel { background: #f0f0f0; color: #555; }
        .u-send { background: #f0f0f0; color: #1a73e8; }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: absolute; bottom: env(safe-area-inset-bottom, 10px); 
            width: 100%; height: 40px;
            display: flex; justify-content: space-around; align-items: center; padding: 0 25%;
        }
        .nav-shape { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.8); }

        [contenteditable="true"] { outline: none; }
    </style>
</head>
<body>

    <div class="phone-screen" id="phoneArea">
        <div class="status-bar">
            <div class="time-side"><span class="editable" contenteditable="true" id="time-top">١١:٣٣</span></div>
            <div class="battery-side">
                <div class="battery-box"><div class="battery-fill" id="battery-level"></div></div>
                <span class="editable" contenteditable="true" id="battery-text">٨٨٪</span>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
            </div>
        </div>

        <div class="clock-container">
            <h1 class="editable" contenteditable="true" id="time-big">١١:٣٣</h1>
            <p class="editable" contenteditable="true" id="date-text">الأربعاء، ٢٤ مايو</p>
        </div>

        <div class="google-bar">
            <span style="color:white; opacity:0.7; font-size: 14px;">بحث Google...</span>
            <i class="fas fa-microphone" style="color:white"></i>
        </div>

        <div class="grid">
            <div class="app"><div class="icon-sq" style="background:#25D366"><i class="fab fa-whatsapp"></i></div><span class="app-text">واتساب</span></div>
            <div class="app"><div class="icon-sq" style="background:#1877F2"><i class="fab fa-facebook"></i></div><span class="app-text">فيسبوك</span></div>
            <div class="app"><div class="icon-sq" style="background:#0088cc"><i class="fab fa-telegram"></i></div><span class="app-text">تيليجرام</span></div>
            <div class="app"><div class="icon-sq" style="background:#FF0000"><i class="fab fa-youtube"></i></div><span class="app-text">يوتيوب</span></div>
        </div>

        <div class="ussd-box" id="ussdBox">
            <div class="ussd-head" style="display: flex; justify-content: space-between;"><span style="background: #E8F0FE; color: #1967D2; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold;">SIM 2</span></div>
            <div class="ussd-body">
                تم تحويل <span class="black-text editable" contenteditable="true" id="amount">200</span> جنيه لرقم <span class="black-text editable" contenteditable="true" id="phone-num">01036543568</span>
                <br> مصاريف الخدمة <span class="black-text editable" contenteditable="true" id="fees">1</span> جنيه . اطلب #9* و اشحن
            </div>
            <input type="text" class="ussd-input" readonly>
            <div class="ussd-actions">
                <button class="u-btn u-cancel" id="btnCancel">Cancel</button>
                <button class="u-btn u-send" id="btnSend">Send</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-shape" style="border-radius:4px"></div>
            <div class="nav-shape" style="border-radius:50%"></div>
            <div class="nav-shape" style="border:none; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(45deg); width:12px; height:12px;"></div>
        </div>
    </div>

    <script>
        const ussdBox = document.getElementById('ussdBox');
        const btnCancel = document.getElementById('btnCancel');
        let isDragging = false;

        // نظام الحفظ
        function saveData() {
            const data = {
                time: document.getElementById('time-top').innerText,
                battery: document.getElementById('battery-text').innerText,
                date: document.getElementById('date-text').innerText,
                amount: document.getElementById('amount').innerText,
                phone: document.getElementById('phone-num').innerText,
                fees: document.getElementById('fees').innerText,
                bottomPos: ussdBox.style.bottom
            };
            localStorage.setItem('hyperos_responsive_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('hyperos_responsive_data');
            if (saved) {
                const d = JSON.parse(saved);
                document.getElementById('time-top').innerText = document.getElementById('time-big').innerText = d.time;
                document.getElementById('battery-text').innerText = d.battery;
                document.getElementById('date-text').innerText = d.date;
                document.getElementById('amount').innerText = d.amount;
                document.getElementById('phone-num').innerText = d.phone;
                document.getElementById('fees').innerText = d.fees;
                ussdBox.style.bottom = d.bottomPos || '15vh';
                updateBattery();
            }
        }

        // تحريك النافذة بمجرد لمس Cancel
        const handleStart = () => { isDragging = true; ussdBox.style.transition = 'none'; };
        const handleEnd = () => { isDragging = false; ussdBox.style.transition = 'bottom 0.2s ease'; saveData(); };

        btnCancel.addEventListener('mousedown', handleStart);
        btnCancel.addEventListener('touchstart', handleStart);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        const onMove = (clientY) => {
            if (!isDragging) return;
            let moveY = window.innerHeight - clientY - 30;
            if (moveY > 10 && moveY < window.innerHeight - 100) {
                ussdBox.style.bottom = moveY + 'px';
            }
        };

        window.addEventListener('mousemove', (e) => onMove(e.clientY));
        window.addEventListener('touchmove', (e) => onMove(e.touches[0].clientY));

        function updateBattery() {
            let text = document.getElementById('battery-text').innerText;
            let val = parseInt(text.replace(/[^0-9٠-٩]/g, '').replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d))) || 0;
            document.getElementById('battery-level').style.width = Math.min(val, 100) + '%';
        }

        document.querySelectorAll('.editable').forEach(el => {
            el.addEventListener('input', () => {
                if(el.id.includes('time')) document.getElementById('time-top').innerText = document.getElementById('time-big').innerText = el.innerText;
                updateBattery();
                saveData();
            });
        });

        window.onload = loadData;
        document.getElementById('btnSend').onclick = () => alert("تم الحفظ!");
    </script>
</body>
</html>
